<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Explore the World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="main-header">
    <h1>Explore the World</h1>
    <p>Contact Us</p>
</header>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Destinations</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
</nav>

<main>
    <section class="hero">
        <h2>Contact Us</h2>
        <p>Complete the form below if you would like more information about our travel destinations.</p>
    </section>

    <form>
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="country">Preferred Destination</label>
        <select id="country" name="country" required>
            <option value="">Choose a destination</option>
            <option value="Japan">Japan</option>
            <option value="Switzerland">Switzerland</option>
            <option value="Italy">Italy</option>
            <option value="Maldives">Maldives</option>
            <option value="France">France</option>
            <option value="Dubai">Dubai</option>
        </select>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message..." required></textarea>

        <button type="submit">Send Message</button>
    </form>
</main>

<footer>
    <p>&copy; 2026 Explore the World | CMPS220 Web Project</p>
    <p>Project by Mohammad Alenezi & Jaber Alenezi</p>
</footer>

</body>
</html>
